name: CI OS

on:
  workflow_dispatch:
    inputs:
      cmd:
        description: "command (ls/run/ps)"
        required: true
        default: "ls"

jobs:
  os:
    runs-on: ubuntu-latest

    steps:
      # 📥 загрузка предыдущего состояния
      - name: Restore state
        uses: actions/download-artifact@v4
        with:
          name: os-state
          path: state
        continue-on-error: true

      - name: Init if empty
        run: |
          mkdir -p state/files state/logs
          [ -f state/db.json ] || echo '{"processes":[]}' > state/db.json

      # 🧠 логика "OS"
      - name: Execute command
        run: |
          CMD="${{ github.event.inputs.cmd }}"
          echo "CMD: $CMD"

          if [ "$CMD" = "ls" ]; then
            echo "=== FILES ==="
            ls -la state/files

          elif [ "$CMD" = "run" ]; then
            echo "=== RUN PROCESS ==="
            ID=$(date +%s)
            echo "process_$ID" > state/files/p_$ID.txt

            python3 - << 'PY'
import json, time
with open("state/db.json") as f:
    db = json.load(f)

pid = int(time.time())
db["processes"].append({"pid": pid, "status": "running"})

with open("state/db.json","w") as f:
    json.dump(db, f)
print("PROCESS STARTED:", pid)
PY

          elif [ "$CMD" = "ps" ]; then
            echo "=== PROCESS LIST ==="
            cat state/db.json

          else
            echo "unknown command"
          fi

      # 📤 сохраняем состояние
      - name: Save state
        uses: actions/upload-artifact@v4
        with:
          name: os-state
          path: state
